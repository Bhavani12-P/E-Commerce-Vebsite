<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CogniFlix | My Profile</title>
    <style>
        body { margin: 0; background: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        .nav { 
            padding: 20px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000;
        }

        .profile-container {
            max-width: 800px;
            margin: 80px auto;
            text-align: center;
        }

        .profile-header img {
            width: 120px;
            height: 120px;
            border-radius: 4px;
            border: 3px solid #E50914;
            margin-bottom: 20px;
        }

        .profile-name { font-size: 40px; font-weight: bold; margin-bottom: 10px; }
        .profile-email { color: #777; margin-bottom: 40px; }

        /* AI Insights Section (A nod to your AI background) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 50px;
        }

        .stat-card {
            background: #222;
            padding: 25px;
            border-radius: 8px;
            border-bottom: 4px solid #E50914;
        }

        .stat-value { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-top: 5px; }

        .btn-edit {
            margin-top: 40px;
            padding: 10px 30px;
            background: transparent;
            color: white;
            border: 1px solid white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-edit:hover { background: white; color: black; }
    </style>
</head>
<body>
    <nav class="nav">
        <div style="color: #E50914; font-size: 28px; font-weight: bold;">COGNIFLIX</div>
        <a href="index.html" style="color: white; text-decoration: none;">Back to Home</a>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=BC&backgroundColor=e50914" alt="Profile">
            <div class="profile-name">Bhavani Chandrika</div>
            <div class="profile-email">chandrika.p@example.com</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value">Sci-Fi</span>
                <span class="stat-label">Top Genre</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">124</span>
                <span class="stat-label">Titles Watched</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">98%</span>
                <span class="stat-label">AI Match Accuracy</span>
            </div>
        </div>

        <button class="btn-edit">Manage Profiles</button>
        <p style="margin-top: 20px;"><a href="index.html" style="color: #777; text-decoration: none; font-size: 14px;">Sign Out of CogniFlix</a></p>
    </div>
</body>
</html>
