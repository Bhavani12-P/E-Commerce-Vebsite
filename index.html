<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CogniFlix | AI-Powered Streaming</title>
    <style>
        body { margin: 0; background: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* Navigation */
        .nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); position: fixed; width: 100%; z-index: 10; box-sizing: border-box; }
        .logo { color: #E50914; font-size: 30px; font-weight: bold; letter-spacing: 1px; }
        
        /* Hero Section */
        .hero { height: 85vh; background: linear-gradient(to right, #141414 10%, transparent 60%), url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070') center/cover; display: flex; align-items: center; padding-left: 50px; position: relative; }
        .hero-content { max-width: 550px; z-index: 2; }
        .hero-content h1 { font-size: 45px; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 18px; line-height: 1.4; margin-bottom: 25px; color: #cccccc; }
        
        /* Interactive Buttons */
        .btn-container { display: flex; gap: 12px; }
        .btn-link { text-decoration: none; color: inherit; }
        .btn { padding: 12px 35px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.2s, background 0.3s; display: flex; align-items: center; gap: 8px; }
        .play { background: white; color: black; }
        .play:hover { background: #e6e6e6; transform: scale(1.05); }
        .info { background: rgba(109, 109, 110, 0.7); color: white; }
        .info:hover { background: rgba(109, 109, 110, 0.4); transform: scale(1.05); }

        /* AI Recommendations Section with Solid Background */
        .row { padding: 40px 50px; background-color: #141414; position: relative; margin-top: -100px; z-index: 3; background: linear-gradient(to top, #141414 85%, transparent 100%); }
        .row h3 { font-size: 22px; margin-bottom: 15px; color: #e5e5e5; font-weight: 500; }
        
        /* Movie Cards Scroll */
        .cards { display: flex; gap: 10px; overflow-x: scroll; scrollbar-width: none; padding: 20px 0; }
        .cards::-webkit-scrollbar { display: none; }
        .card-link { text-decoration: none; color: inherit; display: block; }
        
        .card { min-width: 220px; height: 125px; background: #333; border-radius: 4px; display: flex; align-items: flex-end; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); cursor: pointer; position: relative; overflow: hidden; border: 1px solid #222; }
        .card:hover { transform: scale(1.15); z-index: 5; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .card-title { background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); width: 100%; text-align: center; font-size: 14px; padding: 12px 0; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
        .card:hover .card-title { opacity: 1; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo">COGNIFLIX</div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Featured: AI-Powered Viewing Experience</h1>
            <p>Explore how Artificial Intelligence and a polyglot microservices system (React, Java, Python) manage and personalize a high-end streaming platform.</p>
            <div class="btn-container">
                <a href="https://www.youtube.com/watch?v=YoHD9XEInc0" target="_blank" class="btn-link">
                    <button class="btn play">▶ Play</button>
                </a>
                <a href="https://www.imdb.com/title/tt1375666/" target="_blank" class="btn-link">
                    <button class="btn info">ⓘ More Info</button>
                </a>
            </div>
        </div>
    </header>

    <section class="row">
        <h3>AI-Recommended content</h3>
        <div class="cards">
            <a href="https://www.warnerbros.com/movies/inception" target="_blank" class="card-link">
                <div class="card" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=500'); background-size: cover;">
                    <span class="card-title">Inception</span>
                </div>
            </a>
            <a href="https://www.warnerbros.com/movies/interstellar" target="_blank" class="card-link">
                <div class="card" style="background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=500'); background-size: cover;">
                    <span class="card-title">Interstellar</span>
                </div>
            </a>
            <a href="https://www.warnerbros.com/movies/matrix" target="_blank" class="card-link">
                <div class="card" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=500'); background-size: cover;">
                    <span class="card-title">The Matrix</span>
                </div>
            </a>
            <a href="https://www.warnerbros.com/movies/tenet" target="_blank" class="card-link">
                <div class="card" style="background-image: url('https://images.unsplash.com/photo-1508739773434-c26b3d09e071?q=80&w=500'); background-size: cover;">
                    <span class="card-title">Tenet</span>
                </div>
            </a>
            <a href="https://www.netflix.com/title/80100172" target="_blank" class="card-link">
                <div class="card" style="background-image: url('https://images.unsplash.com/photo-1505506819641-fb0d45a563d2?q=80&w=500'); background-size: cover;">
                    <span class="card-title">Dark</span>
                </div>
            </a>
        </div>
    </section>
</body>
</html>
