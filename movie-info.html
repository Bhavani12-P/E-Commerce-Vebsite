<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Details | CogniFlix</title>
    <style>
        /* Minimalist styles for the Info Page */
        body { background: #141414; color: white; font-family: Arial; margin: 0; }
        .info-hero {
            height: 70vh;
            background: linear-gradient(to top, #141414, transparent), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1200') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
        }
        .meta { color: #46d369; font-weight: bold; margin-bottom: 20px; }
        .synopsis { max-width: 700px; line-height: 1.6; font-size: 18px; color: #ccc; }
        .play-btn { background: white; color: black; padding: 15px 40px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="info-hero">
        <h1>Inception</h1>
        <div class="meta">98% Match | 2010 | 13+ | 2h 28m</div>
        <p class="synopsis">A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O.</p>
        <button class="play-btn">▶ Play Now</button>
    </div>
</body>
</html>
